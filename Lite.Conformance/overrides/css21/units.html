<!doctype html>
<html>
<head>
<title>CSS length units: in / pt / pc / rem</title>
<style>
  html { font-size: 16px; }
  body { margin: 0; background: white; }
  /* 1in = 96px, 75pt = 100px, 2rem = 32px, 6pc = 96px */
  .a { width: 1in; height: 75pt; margin-left: 2rem; background: green; }
  .b { width: 6pc; height: 0.5in; background: blue; }
</style>
</head>
<body>
<div class="a"></div>
<div class="b"></div>
</body>
</html>
