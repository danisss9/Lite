<!doctype html>
<html>
<head>
<title>empty-cells: hide suppresses an empty cell's background</title>
<style>
  body { margin: 0; background: white; }
  table { border-spacing: 0; empty-cells: hide; }
  td { width: 60px; height: 40px; background: green; }
</style>
</head>
<body>
<table><tbody><tr><td></td></tr></tbody></table>
</body>
</html>
