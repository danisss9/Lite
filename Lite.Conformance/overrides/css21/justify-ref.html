<!doctype html>
<html>
<head>
<title>justify reference (equal inter-word gaps == flex space-between)</title>
<style>
  body { margin: 0; background: white; }
  .row { width: 300px; font: 20px monospace; }
  .j { display: flex; justify-content: space-between; }
</style>
</head>
<body><div class="row j"><span>WWW</span><span>III</span><span>MMM</span></div><div class="row">x</div></body>
</html>
