<!doctype html>
<html>
<head>
<title>counters() reference (literal nested numbering)</title>
<style>
  body { margin: 0; background: white; font: 16px monospace; }
  .row { color: black; }
</style>
</head>
<body>
<div>
  <div class="row">1. A</div>
  <div class="row">2. B
    <div>
      <div class="row">2.1. C</div>
      <div class="row">2.2. D</div>
    </div>
  </div>
  <div class="row">3. E</div>
</div>
</body>
</html>
