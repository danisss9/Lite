<!doctype html>
<html>
<head>
<title>CSS length units reference (px equivalents)</title>
<style>
  body { margin: 0; background: white; }
  .a { width: 96px; height: 100px; margin-left: 32px; background: green; }
  .b { width: 96px; height: 48px; background: blue; }
</style>
</head>
<body>
<div class="a"></div>
<div class="b"></div>
</body>
</html>
