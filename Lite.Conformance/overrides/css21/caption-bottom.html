<!doctype html>
<html>
<head>
<title>caption-side: bottom renders the caption below the table</title>
<style>
  body { margin: 0; background: white; }
  table { width: 60px; border-collapse: collapse; }
  caption { caption-side: bottom; height: 20px; background: green; padding: 0; }
  td { height: 30px; background: blue; padding: 0; }
</style>
</head>
<body>
<table>
  <caption></caption>
  <tbody><tr><td></td></tr></tbody>
</table>
</body>
</html>
